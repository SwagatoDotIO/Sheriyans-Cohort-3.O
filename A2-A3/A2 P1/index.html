<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

<body>
    <header>

            <div class="logo">
                <img id="icon" src="logo.png" alt="">

                    <li>Home</li>
                    <li>About Us</li>

        <div class="title">
            <h1>Insights & Blogs</h1>
        </div>

    <main>
        <div class="maintop">
            <ul>
                <li><button id="spcl" disabled="disabled">All</button></li>

                    <img src="martini.jpg" alt="">

                <div class="image">
                    <img src="chair.jpg" alt="">
                </div>

                    <span>SaaS</span>
                </div>

                    <h1>5 Key Trends In SaaS Growth In 2025</h1>
                    <h3>May 23,2025</h3>
                </div>
            </div>
            <div class="card">
                <div class="image">
                    <img src="cat.png" alt="">
                </div>
                <div class="capsule">
                    <span class="small">Marketing</span>
                </div>
                <div class="content">
                    <h1>How Data-Driven Stratigies Are Important</h1>
                    <h3>May 23,2025</h3>
